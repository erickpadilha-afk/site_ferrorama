<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="logo-container">
        <div class="circle"></div>
        <img src="GTT logo.png" alt="Logo GTT" class="logo">
    </div>
    <h3 class="slogan" style="color: gold;">Cadastre agpra para seus melhores momentos</h3>
    
    <div class="login-box">
        <form id="loginform" class="login-form">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="senha" placeholder="Senha" required>
            </div>
            
            <div class="botoes-container">
                <a  id="login-button" href="../dashboard/dashboard.html">Esqueci a senha</a>
                 <a  id="login-button" href="../dashboard/dashboard.html">Fazer login</a>
            </div>
        </form>
    </div>

    <div class="cadastro-container">
        <p class="texto-claro">Não tem um login?</p>
        <a  id="login-button" href="cadastro.html">Cadastrar-se</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
