<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="logo-container">
        <div class="circle"></div>
        <img src="GTT logo.png" alt="Logo GTT" class="logo">
    </div>
    <h3 class="slogan" style="color: gold;">Cadastre agora para seus melhores momentos</h3>
    
    <div class="login-box">
        <form id="loginform" class="login-form">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="senha" placeholder="Senha" required>
            </div>
            <div class="input-group">
                <input type="date" id="data_nasc" placeholder="Data de Na" reentoquirimed>
            </div>
            
            <div class="botoes-container">
                <button type="submit" id="login-button">Confirmar</button>
                <a  id="login-button" href="../dashboard/dashboard.html">Esqueci a senha</a>
                 <a  id="login-button" href="../dashboard/dashboard.html">Fazer login</a>
            </div>
        </form>
    </div>

    <script src="sccadastro.js</script>
</body>
</html>
