<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo-container">
        <div class="circle"></div>
        <img src="GTT logo.png" alt="Logo GTT" class="logo">
    </div>
    <h3 class="slogan" style="color: gold;">Onde a excelência se encontra com os trilhos</h3>
    
    <div class="login-box">
        <form id="loginform" class="login-form">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="senha" placeholder="Senha" required>
            </div>
            
            <div class="botoes-container">
                <a id="password-button" href="recuperar-senha.html">Esqueci a senha</a>
                <button type="submit" id="login-button">Fazer login</button>
            </div>
        </form>
    </div>

    <div class="cadastro-container">
        <p class="texto-claro">Não tem um login?</p>
        <a id="register-button" href="cadastro.html">Cadastrar-se</a>
    </div>

    <div class="relatorio-container">
        <a id="report-button" href="relatorio/relatorio.html">Acessar relatorio (experimental)</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
